<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFO Cross</title>
    <style>
        body { margin: 0; font-family: sans-serif; }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('starry_background.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #progress-bar {
            position: absolute;
            bottom: 20px;
            width: 80%;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 5px;
            overflow: hidden;
        }
        #progress {
            height: 100%;
            background-color: #00ff00;
            width: 0;
            transition: width 0.2s;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div>Loading, please wait...</div>
        <div id="progress-bar"><div id="progress"></div></div>
        <div>Health Gaming Advisory: Play responsibly.</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script>
        function showLoading() {
            document.getElementById('loading').style.opacity = 1;
            let progress = 0;
            const progressBar = document.getElementById('progress');
            const interval = setInterval(() => {
                progress += 5; // increment progress
                progressBar.style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(hideLoading, 500);
                }
            }, 100);
            requestAnimationFrame(loop);
        }

        function hideLoading() {
            document.getElementById('loading').style.opacity = 0;
            setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 500);
        }

        function loop() {
            // Main game loop code here
            requestAnimationFrame(loop);
        }

        // Call showLoading on boot
        showLoading();
        // Example of calling showMenu after loading
        setTimeout(showMenu, 2500); // adjust timing as appropriate
    </script>
</body>
</html>
